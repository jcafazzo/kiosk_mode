<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kiosk Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

  #frame {
    position: absolute;
    top: 50%; left: 50%;
    border: none;
  }
  #frame.rot90  { width: 100vh; height: 100vw; transform: translate(-50%, -50%) rotate(90deg); }
  #frame.rot-90 { width: 100vh; height: 100vw; transform: translate(-50%, -50%) rotate(-90deg); }
  #frame.rot0   { width: 100vw; height: 100vh; transform: translate(-50%, -50%); }

  #bar {
    position: fixed; bottom: 0; left: 0; width: 0%; height: 3px;
    background: #333; z-index: 9999;
  }

  #waiting {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #444; font-family: system-ui, sans-serif;
    font-size: 1.2em; text-align: center;
  }
  #waiting .url { color: #666; font-size: 0.8em; margin-top: 12px; font-family: monospace; }
</style>
</head>
<body>

<div id="waiting">
  Waiting for configuration...
  <div class="url">Configure at: <span id="remote-url"></span></div>
</div>

<iframe id="frame"></iframe>
<div id="bar"></div>

<script>
  var CACHE_KEY = 'kiosk_display_config';
  var pages = [], idx = 0, timer = null, rotation = '0';
  var POLL_MS = 30000;
  var configHash = '';

  // Show the remote URL
  var loc = window.location;
  document.getElementById('remote-url').textContent = loc.protocol + '//' + loc.host + '/';

  function frameSrc(url, useProxy) {
    if (useProxy) {
      var proxyUrl = '/proxy?url=' + encodeURIComponent(url);
      // Forward original query params so the page's JS can detect them
      try {
        var q = new URL(url).search;
        if (q) proxyUrl += '&' + q.substring(1);
      } catch(e) {}
      return proxyUrl;
    }
    return url;
  }

  function show() {
    if (!pages.length) return;
    document.getElementById('waiting').style.display = 'none';

    var page = pages[idx];
    var frame = document.getElementById('frame');
    frame.className = 'rot' + rotation;
    frame.src = frameSrc(page.url, page.proxy);

    var ms = page.mins * 60000;

    var bar = document.getElementById('bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    bar.offsetWidth; // force reflow
    bar.style.transition = 'width ' + ms + 'ms linear';
    bar.style.width = '100%';

    clearTimeout(timer);
    timer = setTimeout(function() {
      idx = (idx + 1) % pages.length;
      show();
    }, ms);
  }

  function applyConfig(data, save) {
    if (!data || !data.pages || !data.pages.length) return;

    // Only restart if config actually changed
    var hash = JSON.stringify(data);
    if (hash === configHash) return;
    configHash = hash;

    // Cache to localStorage
    if (save) {
      try { localStorage.setItem(CACHE_KEY, hash); } catch(e) {}
    }

    pages = data.pages;
    rotation = data.rotation || '0';
    idx = 0;
    clearTimeout(timer);
    show();
  }

  function loadCachedConfig() {
    try {
      var raw = localStorage.getItem(CACHE_KEY);
      if (raw) { applyConfig(JSON.parse(raw), false); return true; }
    } catch(e) {}
    return false;
  }

  function fetchConfig() {
    fetch('/api/config')
      .then(function(r) { return r.json(); })
      .then(function(data) { applyConfig(data, true); })
      .catch(function(err) { console.log('Config fetch error:', err); });
  }

  // Load cached config immediately, then poll API for updates
  loadCachedConfig();
  fetchConfig();
  setInterval(fetchConfig, POLL_MS);
</script>
</body>
</html>
