<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portrait Kiosk - Remote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

  #frame {
    position: absolute;
    top: 50%; left: 50%;
    border: none;
  }
  #frame.rot90  { width: 100vh; height: 100vw; transform: translate(-50%, -50%) rotate(90deg); }
  #frame.rot-90 { width: 100vh; height: 100vw; transform: translate(-50%, -50%) rotate(-90deg); }
  #frame.rot0   { width: 100vw; height: 100vh; transform: translate(-50%, -50%); }

  #config {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e; color: #eee;
    font-family: system-ui, sans-serif;
    padding: 40px; overflow-y: auto; z-index: 10;
  }
  #config h1 { margin-bottom: 8px; font-size: 1.4em; }
  #config .subtitle { color: #888; font-size: 0.85em; margin-bottom: 20px; }
  #config label { display: block; margin: 14px 0 4px; font-size: 0.9em; color: #aaa; }
  #config select, #config input[type=number] {
    background: #16213e; color: #eee; border: 1px solid #444;
    border-radius: 4px; padding: 6px 10px; font-size: 1em;
  }
  #config select { width: 200px; }
  #config input[type=number] { width: 80px; }

  .btn {
    margin-top: 20px; padding: 10px 28px;
    color: #eee; border: none;
    border-radius: 4px; font-size: 1em; cursor: pointer;
  }
  .btn-primary { background: #0f3460; }
  .btn-primary:hover { background: #1a5276; }
  .btn-push { background: #1a6030; }
  .btn-push:hover { background: #1a7a3a; }

  .hint { font-size: 0.8em; color: #666; margin-top: 4px; }

  .display-link {
    margin-top: 20px; padding: 14px 18px;
    background: #16213e; border: 1px solid #333;
    border-radius: 6px; max-width: 700px;
  }
  .display-link strong { color: #aaa; font-size: 0.85em; display: block; margin-bottom: 4px; }
  .display-link a { color: #4ea8de; font-family: monospace; font-size: 0.95em; }
  .display-link .note { color: #555; font-size: 0.8em; margin-top: 6px; }

  #entries { width: 100%; max-width: 700px; margin-top: 8px; }
  .entry {
    display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
  }
  .entry input[type=text] {
    flex: 1; background: #16213e; color: #eee; border: 1px solid #444;
    border-radius: 4px; padding: 8px 10px; font-family: monospace; font-size: 0.9em;
  }
  .entry input[type=number] { width: 70px; }
  .entry .proxy-label {
    font-size: 0.75em; color: #666; display: flex; align-items: center; gap: 2px;
    cursor: pointer; white-space: nowrap;
  }
  .entry .proxy-label input { margin: 0; }
  .entry .remove-btn {
    background: #5a2020; color: #ccc; border: none; border-radius: 4px;
    padding: 6px 10px; cursor: pointer; font-size: 0.9em;
  }
  .entry .remove-btn:hover { background: #7a2020; }
  #add-btn {
    margin-top: 6px; padding: 6px 16px;
    background: #1a3a2e; color: #aaa; border: 1px dashed #444;
    border-radius: 4px; cursor: pointer; font-size: 0.85em;
  }
  #add-btn:hover { background: #1a4a3e; color: #eee; }

  #bar {
    position: fixed; bottom: 0; left: 0; width: 0%; height: 3px;
    background: #333; z-index: 9999;
  }

  #toast {
    display: none; position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    background: #1a6030; color: #eee; padding: 10px 24px;
    border-radius: 6px; font-size: 0.95em; z-index: 20;
    font-family: system-ui, sans-serif;
  }
</style>
</head>
<body>

<div id="config">
  <h1>Portrait Kiosk</h1>
  <p class="subtitle">Configure the kiosk display remotely.</p>

  <div class="display-link">
    <strong>TV Display URL</strong>
    <a id="display-url" href="/display" target="_blank">/display</a>
    <div class="note">Open this URL on your TV or kiosk device. It will auto-update when you push changes.</div>
  </div>

  <label>Rotation</label>
  <select id="rotation">
    <option value="0">None (landscape)</option>
    <option value="90">+90 (clockwise)</option>
    <option value="-90">-90 (counter-clockwise)</option>
  </select>

  <label>Pages <span style="font-size:0.75em;color:#666">(check P to proxy sites that block iframes)</span></label>
  <div id="entries"></div>
  <button type="button" id="add-btn">+ Add page</button>

  <p class="hint" style="margin-top:16px">
    <b>Push to Display</b> sends config to the TV.
    <b>Preview</b> shows it locally (Escape or triple-click to exit).
  </p>
  <br>
  <button class="btn btn-push" id="push-btn">Push to Display</button>
  <button class="btn btn-primary" id="preview-btn" style="margin-left:8px">Preview Locally</button>
</div>

<iframe id="frame"></iframe>
<div id="bar"></div>
<div id="toast"></div>

<script>
  var STORAGE_KEY = 'kiosk_config';
  var pages = [], idx = 0, timer = null;

  // --- Display URL ---
  var loc = window.location;
  var displayUrl = loc.protocol + '//' + loc.host + '/display';
  var displayLink = document.getElementById('display-url');
  displayLink.href = displayUrl;
  displayLink.textContent = displayUrl;

  // --- Toast ---
  var toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.style.display = 'none'; }, 3000);
  }

  // --- Entry management ---
  function createEntry(url, mins, proxy) {
    var row = document.createElement('div');
    row.className = 'entry';

    var urlInput = document.createElement('input');
    urlInput.type = 'text';
    urlInput.placeholder = 'example.com';
    urlInput.value = url;

    var minsInput = document.createElement('input');
    minsInput.type = 'number';
    minsInput.value = mins;
    minsInput.min = '0.1';
    minsInput.step = '0.5';
    minsInput.title = 'Minutes';

    var minLabel = document.createTextNode(' min ');

    var proxyLabel = document.createElement('label');
    proxyLabel.className = 'proxy-label';
    var proxyCb = document.createElement('input');
    proxyCb.type = 'checkbox';
    proxyCb.checked = !!proxy;
    proxyCb.title = 'Proxy this site (strips iframe-blocking headers)';
    proxyLabel.appendChild(proxyCb);
    proxyLabel.appendChild(document.createTextNode(' P'));

    var removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.title = 'Remove';
    removeBtn.textContent = 'X';
    removeBtn.addEventListener('click', function() { row.remove(); });

    row.appendChild(urlInput);
    row.appendChild(minsInput);
    row.appendChild(minLabel);
    row.appendChild(proxyLabel);
    row.appendChild(removeBtn);
    document.getElementById('entries').appendChild(row);
  }

  function readEntries() {
    var rows = document.querySelectorAll('.entry');
    return Array.from(rows).map(function(r) {
      return {
        url: r.querySelector('input[type=text]').value.trim(),
        mins: parseFloat(r.querySelector('input[type=number]').value) || 5,
        proxy: r.querySelector('.proxy-label input[type=checkbox]').checked
      };
    }).map(function(e) {
      if (e.url && !/^https?:\/\//i.test(e.url)) e.url = 'https://' + e.url;
      return e;
    }).filter(function(e) { return e.url; });
  }

  function getConfig() {
    return {
      rotation: document.getElementById('rotation').value,
      pages: readEntries()
    };
  }

  // --- LocalStorage ---
  function saveLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(getConfig()));
  }

  function loadLocal() {
    try {
      var data = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!data) return false;
      applyToForm(data);
      return true;
    } catch(e) {}
    return false;
  }

  function applyToForm(data) {
    if (data.rotation) document.getElementById('rotation').value = data.rotation;
    // Clear existing entries
    document.getElementById('entries').textContent = '';
    if (data.pages && data.pages.length) {
      data.pages.forEach(function(p) { createEntry(p.url, p.mins, p.proxy); });
    }
  }

  // --- Remote API ---
  function pushToDisplay() {
    var config = getConfig();
    if (!config.pages.length) return alert('Add at least one page.');
    saveLocal();

    fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config)
    })
    .then(function(r) {
      if (r.ok) showToast('Pushed to display');
      else showToast('Error pushing config');
    })
    .catch(function() { showToast('Network error — are you on Netlify?'); });
  }

  function fetchRemoteConfig() {
    fetch('/api/config')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.pages && data.pages.length) {
          applyToForm(data);
          saveLocal();
        }
      })
      .catch(function() {}); // Silently fail (e.g., running locally)
  }

  // --- Local preview ---
  function frameSrc(url, useProxy) {
    if (useProxy) {
      var proxyUrl = '/proxy?url=' + encodeURIComponent(url);
      // Forward original query params so the page's JS can detect them
      try {
        var q = new URL(url).search;
        if (q) proxyUrl += '&' + q.substring(1);
      } catch(e) {}
      return proxyUrl;
    }
    return url;
  }

  function preview() {
    pages = readEntries();
    if (!pages.length) return alert('Add at least one page.');
    saveLocal();
    document.getElementById('config').style.display = 'none';

    var rot = document.getElementById('rotation').value;
    document.getElementById('frame').className = 'rot' + rot;

    idx = 0;
    show();
  }

  function show() {
    var page = pages[idx];
    document.getElementById('frame').src = frameSrc(page.url, page.proxy);
    var ms = page.mins * 60000;

    var bar = document.getElementById('bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    bar.offsetWidth; // force reflow
    bar.style.transition = 'width ' + ms + 'ms linear';
    bar.style.width = '100%';

    clearTimeout(timer);
    timer = setTimeout(function() {
      idx = (idx + 1) % pages.length;
      show();
    }, ms);
  }

  function exitPreview() {
    clearTimeout(timer);
    document.getElementById('config').style.display = '';
    document.getElementById('frame').src = 'about:blank';
    document.getElementById('frame').className = '';
    document.getElementById('bar').style.width = '0%';
  }

  // --- Exit: Escape key ---
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') exitPreview();
  });

  // --- Exit: Triple-click ---
  var clickCount = 0, clickTimer = null;
  document.addEventListener('click', function() {
    if (document.getElementById('config').style.display !== 'none') return;
    clickCount++;
    clearTimeout(clickTimer);
    if (clickCount >= 3) { clickCount = 0; exitPreview(); return; }
    clickTimer = setTimeout(function() { clickCount = 0; }, 600);
  });

  // --- Buttons ---
  document.getElementById('add-btn').addEventListener('click', function() { createEntry('', 0.25, false); });
  document.getElementById('push-btn').addEventListener('click', pushToDisplay);
  document.getElementById('preview-btn').addEventListener('click', preview);

  // --- Init ---
  // Try loading from remote first, fall back to localStorage, then defaults
  if (!loadLocal()) {
    createEntry('https://thewolfondchair.ca/wolfond-report-2024-2026.html?kiosk', 0.25, false);
    createEntry('https://humanfactors.ca', 0.25, false);
    createEntry('https://centrefordigitaltherapeutics.ca', 0.25, true);
    createEntry('https://www.uhn.ca', 0.25, true);
  }
  fetchRemoteConfig();
</script>
</body>
</html>
