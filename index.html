<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portrait Kiosk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

  #frame {
    position: absolute;
    top: 50%; left: 50%;
    width: 100vh; height: 100vw;
    transform: translate(-50%, -50%) rotate(90deg);
    border: none;
  }

  #config {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e; color: #eee;
    font-family: system-ui, sans-serif;
    padding: 40px; overflow-y: auto; z-index: 10;
  }
  #config h1 { margin-bottom: 20px; font-size: 1.4em; }
  #config label { display: block; margin: 12px 0 4px; font-size: 0.9em; color: #aaa; }
  #config textarea {
    width: 100%; max-width: 600px; height: 160px;
    background: #16213e; color: #eee; border: 1px solid #444;
    border-radius: 4px; padding: 10px; font-family: monospace; font-size: 0.9em;
    resize: vertical;
  }
  #config input[type=number] {
    width: 80px; background: #16213e; color: #eee;
    border: 1px solid #444; border-radius: 4px; padding: 6px 10px;
    font-size: 1em;
  }
  #config button {
    margin-top: 20px; padding: 10px 28px;
    background: #0f3460; color: #eee; border: none;
    border-radius: 4px; font-size: 1em; cursor: pointer;
  }
  #config button:hover { background: #1a5276; }
  .hint { font-size: 0.8em; color: #666; margin-top: 4px; }

  #bar {
    position: fixed; bottom: 0; left: 0; height: 3px;
    background: #e94560; z-index: 5; transition: width 1s linear;
  }
</style>
</head>
<body>

<div id="config">
  <h1>Portrait Kiosk</h1>
  <label>URLs (one per line)</label>
  <textarea id="urls">https://example.com
https://www.wikipedia.org</textarea>
  <label>Rotate (minutes per page)</label>
  <input type="number" id="interval" value="5" min="0.1" step="0.5">
  <p class="hint">Press Escape at any time to return to this screen.</p>
  <br>
  <button onclick="start()">Start</button>
</div>

<iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
<div id="bar"></div>

<script>
  let urls = [], idx = 0, timer = null, barTimer = null;

  function start() {
    const raw = document.getElementById('urls').value.trim();
    urls = raw.split('\n').map(u => u.trim()).filter(Boolean);
    if (!urls.length) return alert('Add at least one URL.');
    document.getElementById('config').style.display = 'none';
    idx = 0;
    show();
  }

  function show() {
    document.getElementById('frame').src = urls[idx];
    const mins = parseFloat(document.getElementById('interval').value) || 5;
    const ms = mins * 60000;

    // progress bar
    const bar = document.getElementById('bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    requestAnimationFrame(() => {
      bar.style.transition = `width ${ms}ms linear`;
      bar.style.width = '100%';
    });

    clearTimeout(timer);
    timer = setTimeout(() => {
      idx = (idx + 1) % urls.length;
      show();
    }, ms);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      clearTimeout(timer);
      document.getElementById('config').style.display = '';
      document.getElementById('frame').src = 'about:blank';
      document.getElementById('bar').style.width = '0%';
    }
  });
</script>
</body>
</html>
